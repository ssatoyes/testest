<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Mascot Loading Sample</title>
    <style>
      :root {
        --brand: #0080ff;
        --brand-strong: #004c9c;
        --cyan: #00a6d6;
        --green: #12b76a;
        --yellow: #ffd84d;
        --ink: #111827;
        --text: #243246;
        --muted: #667085;
        --line: #d9e4f2;
        --line-soft: #e9eff7;
        --bg: #f5f8ff;
        --surface: #ffffff;
        --surface-blue: #f4f9ff;
        --shadow: 0 18px 46px rgba(16, 24, 40, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(rgba(0, 116, 217, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 116, 217, 0.055) 1px, transparent 1px),
          linear-gradient(135deg, #ffffff 0%, var(--bg) 100%);
        background-size: 28px 28px, 28px 28px, auto;
        font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        letter-spacing: 0;
      }

      .demo {
        width: min(1080px, 100%);
        min-height: 100vh;
        display: grid;
        align-content: center;
        gap: 20px;
        margin: 0 auto;
        padding: 32px;
      }

      .stage {
        display: grid;
        grid-template-columns: minmax(300px, 1.05fr) minmax(320px, 1fr);
        gap: 18px;
        align-items: stretch;
      }

      .analysis-panel,
      .status-panel,
      .compact-loader {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .analysis-panel {
        position: relative;
        overflow: hidden;
        min-height: 430px;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 22px;
        padding: 42px 32px;
      }

      .analysis-panel::before {
        position: absolute;
        inset: 0;
        content: "";
        background:
          linear-gradient(90deg, transparent, rgba(0, 128, 255, 0.11), transparent),
          repeating-linear-gradient(0deg, transparent 0 34px, rgba(0, 166, 214, 0.08) 35px);
        opacity: 0.8;
        animation: panel-scan 3.8s ease-in-out infinite;
      }

      .analysis-panel::after {
        position: absolute;
        inset: 18px;
        content: "";
        border: 1px solid rgba(0, 128, 255, 0.16);
        border-radius: 8px;
        pointer-events: none;
      }

      .mascot-zone {
        position: relative;
        z-index: 1;
        width: 176px;
        height: 176px;
        display: grid;
        place-items: center;
      }

      .mascot-zone::before {
        position: absolute;
        inset: 23px;
        content: "";
        border: 1px solid rgba(0, 128, 255, 0.2);
        border-radius: 50%;
        animation: pulse-ring 2.4s ease-in-out infinite;
      }

      .mascot-zone::after {
        position: absolute;
        inset: 6px;
        content: "";
        border-radius: 50%;
        background: conic-gradient(from 70deg, transparent 0 26%, rgba(0, 128, 255, 0.72) 32%, transparent 39% 69%, rgba(0, 166, 214, 0.55) 76%, transparent 83%);
        mask: radial-gradient(circle, transparent 0 63%, #000 64% 69%, transparent 70%);
        animation: spin 1.8s linear infinite;
      }

      .mascot {
        position: relative;
        z-index: 1;
        width: 88px;
        height: 88px;
        display: block;
        object-fit: contain;
        filter: drop-shadow(0 12px 18px rgba(16, 24, 40, 0.22));
        animation: mascot-float 1.9s ease-in-out infinite;
      }

      .scan-line {
        position: absolute;
        z-index: 2;
        left: 28px;
        right: 28px;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, var(--cyan), #ffffff, var(--cyan), transparent);
        box-shadow: 0 0 18px rgba(0, 166, 214, 0.72);
        animation: scan-line 1.75s ease-in-out infinite;
      }

      .signal {
        position: absolute;
        z-index: 1;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--brand);
        opacity: 0;
        animation: signal-rise 2.2s ease-in-out infinite;
      }

      .signal.one {
        top: 36px;
        left: 26px;
      }

      .signal.two {
        right: 28px;
        bottom: 42px;
        background: var(--green);
        animation-delay: 0.45s;
      }

      .signal.three {
        left: 56px;
        bottom: 22px;
        background: var(--yellow);
        animation-delay: 0.8s;
      }

      .headline {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 8px;
        text-align: center;
      }

      .headline h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.25;
      }

      .headline p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .dots::after {
        display: inline-block;
        width: 22px;
        text-align: left;
        content: "";
        animation: loading-dots 1.2s steps(4, end) infinite;
      }

      .progress {
        position: relative;
        z-index: 1;
        width: min(360px, 100%);
        display: grid;
        gap: 9px;
      }

      .progress-track {
        height: 9px;
        overflow: hidden;
        border-radius: 999px;
        background: #edf2f7;
      }

      .progress-track span {
        display: block;
        width: 44%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--brand-strong), var(--brand), var(--cyan));
        animation: progress-fill 2.4s ease-in-out infinite;
      }

      .progress-meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .status-panel {
        display: grid;
        align-content: stretch;
        padding: 22px;
      }

      .status-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--line-soft);
      }

      .status-header strong {
        display: block;
        font-size: 16px;
      }

      .status-header span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .status-pill {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 7px 10px;
        border: 1px solid rgba(18, 183, 106, 0.2);
        border-radius: 999px;
        color: #047857;
        background: #ecfdf3;
        font-size: 12px;
        font-weight: 700;
      }

      .status-pill::before {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        content: "";
        animation: live-dot 1.2s ease-in-out infinite;
      }

      .status-list {
        display: grid;
        gap: 12px;
        margin: 0;
        padding: 18px 0 0;
        list-style: none;
      }

      .status-list li {
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        min-height: 48px;
        padding: 10px 0;
        border-bottom: 1px solid var(--line-soft);
      }

      .status-list li:last-child {
        border-bottom: 0;
      }

      .step-icon {
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        color: var(--brand);
        background: var(--surface-blue);
        font-size: 13px;
        font-weight: 700;
      }

      .status-list strong {
        display: block;
        font-size: 13px;
      }

      .status-list span {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
      }

      .mini-bar {
        width: 64px;
        height: 5px;
        overflow: hidden;
        border-radius: 999px;
        background: #edf2f7;
      }

      .mini-bar span {
        display: block;
        width: 55%;
        height: 100%;
        border-radius: inherit;
        background: var(--brand);
        animation: mini-progress 1.8s ease-in-out infinite;
      }

      .compact-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .compact-loader {
        display: flex;
        align-items: center;
        gap: 14px;
        min-height: 92px;
        padding: 16px;
      }

      .compact-loader .mascot-zone {
        flex: 0 0 58px;
        width: 58px;
        height: 58px;
      }

      .compact-loader .mascot-zone::before,
      .compact-loader .mascot-zone::after,
      .compact-loader .scan-line,
      .compact-loader .signal {
        display: none;
      }

      .compact-loader .mascot {
        width: 44px;
        height: 44px;
      }

      .compact-text {
        min-width: 0;
      }

      .compact-text strong {
        display: block;
        font-size: 14px;
      }

      .compact-text span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes mascot-float {
        0%,
        100% {
          transform: translateY(0) rotate(-1deg);
        }

        50% {
          transform: translateY(-8px) rotate(2deg);
        }
      }

      @keyframes panel-scan {
        0%,
        100% {
          transform: translateX(-24%);
          opacity: 0.45;
        }

        50% {
          transform: translateX(24%);
          opacity: 0.95;
        }
      }

      @keyframes pulse-ring {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(0.92);
        }

        50% {
          opacity: 1;
          transform: scale(1.08);
        }
      }

      @keyframes scan-line {
        0%,
        100% {
          top: 48px;
          opacity: 0;
        }

        18%,
        82% {
          opacity: 1;
        }

        50% {
          top: 124px;
        }
      }

      @keyframes signal-rise {
        0% {
          opacity: 0;
          transform: translateY(10px) scale(0.7);
        }

        35%,
        72% {
          opacity: 1;
        }

        100% {
          opacity: 0;
          transform: translateY(-18px) scale(1);
        }
      }

      @keyframes progress-fill {
        0% {
          width: 16%;
          transform: translateX(-20%);
        }

        58% {
          width: 82%;
          transform: translateX(0);
        }

        100% {
          width: 44%;
          transform: translateX(160%);
        }
      }

      @keyframes mini-progress {
        0% {
          transform: translateX(-85%);
        }

        100% {
          transform: translateX(150%);
        }
      }

      @keyframes live-dot {
        0%,
        100% {
          opacity: 0.45;
          transform: scale(0.8);
        }

        50% {
          opacity: 1;
          transform: scale(1.15);
        }
      }

      @keyframes loading-dots {
        0% {
          content: "";
        }

        25% {
          content: ".";
        }

        50% {
          content: "..";
        }

        75%,
        100% {
          content: "...";
        }
      }

      @media (max-width: 900px) {
        .demo {
          padding: 22px;
        }

        .stage,
        .compact-row {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        .demo {
          padding: 16px;
        }

        .analysis-panel,
        .status-panel {
          padding: 20px;
        }

        .analysis-panel {
          min-height: 390px;
        }

        .headline h1 {
          font-size: 20px;
        }

        .status-list li {
          grid-template-columns: 28px minmax(0, 1fr);
        }

        .mini-bar {
          grid-column: 2;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="demo">
      <section class="stage" aria-label="AI 분석 로딩 샘플">
        <div class="analysis-panel" role="status" aria-live="polite">
          <div class="mascot-zone" aria-hidden="true">
            <span class="scan-line"></span>
            <span class="signal one"></span>
            <span class="signal two"></span>
            <span class="signal three"></span>
            <img class="mascot" src="../assets/images/ai-mascot-header-icon.png" alt="">
          </div>

          <div class="headline">
            <h1>AI가 분석중입니다<span class="dots"></span></h1>
            <p>요청한 데이터를 읽고, 패턴과 이상 신호를 확인하고 있습니다.</p>
          </div>

          <div class="progress" aria-label="분석 진행중">
            <div class="progress-track">
              <span></span>
            </div>
            <div class="progress-meta">
              <span>Context scan</span>
              <span>Model inference</span>
            </div>
          </div>
        </div>

        <aside class="status-panel" aria-label="분석 상태">
          <div class="status-header">
            <div>
              <strong>AI 분석 상태</strong>
              <span>실시간 처리 흐름</span>
            </div>
            <span class="status-pill">LIVE</span>
          </div>

          <ul class="status-list">
            <li>
              <span class="step-icon">1</span>
              <div>
                <strong>요청 데이터 수집</strong>
                <span>입력값과 관련 문맥을 정리합니다.</span>
              </div>
              <div class="mini-bar"><span></span></div>
            </li>
            <li>
              <span class="step-icon">2</span>
              <div>
                <strong>AI 패턴 분석</strong>
                <span>핵심 조건과 유사 사례를 비교합니다.</span>
              </div>
              <div class="mini-bar"><span></span></div>
            </li>
            <li>
              <span class="step-icon">3</span>
              <div>
                <strong>결과 생성 준비</strong>
                <span>사용자에게 보여줄 답변을 구성합니다.</span>
              </div>
              <div class="mini-bar"><span></span></div>
            </li>
          </ul>
        </aside>
      </section>

      <section class="compact-row" aria-label="작은 로딩 컴포넌트">
        <div class="compact-loader" role="status" aria-live="polite">
          <div class="mascot-zone" aria-hidden="true">
            <img class="mascot" src="../assets/images/ai-mascot-header-icon.png" alt="">
          </div>
          <div class="compact-text">
            <strong>분석중<span class="dots"></span></strong>
            <span>검색 결과를 정리하고 있습니다.</span>
          </div>
        </div>

        <div class="compact-loader" role="status" aria-live="polite">
          <div class="mascot-zone" aria-hidden="true">
            <img class="mascot" src="../assets/images/ai-mascot-header-icon.png" alt="">
          </div>
          <div class="compact-text">
            <strong>AI 응답 준비중<span class="dots"></span></strong>
            <span>잠시만 기다려 주세요.</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
